spring.application.name=matquiz-ai-service-java

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

spring.ai.openai-sdk.api-key=${OPENAI_API_KEY}
spring.ai.openai-sdk.chat.options.model=gpt-5-mini-2025-08-07
spring.ai.openai-sdk.chat.options.service-tier=priority

# Rabbit listener concurrency for parallel quiz generation workers
spring.rabbitmq.listener.simple.concurrency=${RABBIT_LISTENER_CONCURRENCY:4}
spring.rabbitmq.listener.simple.max-concurrency=${RABBIT_LISTENER_MAX_CONCURRENCY:12}
spring.rabbitmq.listener.simple.prefetch=${RABBIT_LISTENER_PREFETCH:1}
