services:
  postgres-db:
    image: postgres:16-alpine
    container_name: matquiz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: matquiz_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d matquiz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
